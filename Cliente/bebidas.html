<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Cardápio</title>
        <link rel="stylesheet" href="cliente.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Almendra+SC&display=swap" rel="stylesheet">
    </head>
    <body>

        <!-- Precisa ter: menu lateral, pizzas -->
        <nav>
            <div class="container">
                <aside class="sidebar">
                    <ul>
                        <li><a class="almendra-sc-regular" href="index.html">Pizzas</a></li>
                        <li><a class="almendra-sc-regular setinha" href="bebidas.html">Bebidas</a></li>
                        <li class="pagamento"><a href="pagamento.html">Pagar</a></li>
                    </ul>
                </aside>
            </div>
        </nav>
        <main class="principal">
            <section id="salgadas">
                <h2>Refrigerantes</h2>
                <div class="grid-pizzas">
                    <div class="card-pizza">
                        <img src="/assets/pizza_calabresa.png" alt="Calabresa">
                        <h3>Calabresa</h3>
                        <p>Molho de tomate, mussarela, calabresa e cebola.</p>
                        <span class="preco">R$ 45,00</span>
                        <div class="botoes">
                            <button class="btn-adicionar">+</button>
                            <button class="btn-remover">-</button>
                        </div>
                    </div>
                </div>
             </section>
            <section id="doces">
                <h2>Sucos</h2>
                <div class="grid-pizzas">
                    <div class="card-pizza">
                        <img src="/assets/pizza_chocolate.png" alt="Chocolate">
                        <h3>Chocolate</h3>
                        <p>Chocolate ao leite com morangos frescos.</p>
                        <span class="preco">R$ 50,00</span>
                        <div class="botoes">
                            <button class="btn-adicionar">+</button>
                            <button class="btn-remover">-</button>
                        </div>
                    </div>
                </div>
            </section>
            <section id="vegetarianas">
                <h2>Pizzas Vegetarianas</h2>
                <div class="grid-pizzas">
                    <div class="card-pizza">
                        <img src="/assets/pizza_marguerita.png" alt="Marguerita">
                        <h3>Marguerita</h3>
                        <p>Mussarela, manjericão fresco e fatias de tomate.</p>
                        <span class="preco">R$ 42,00</span>
                        <div class="botoes">
                            <button class="btn-adicionar">+</button>
                            <button class="btn-remover">-</button>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </body>
</html>
