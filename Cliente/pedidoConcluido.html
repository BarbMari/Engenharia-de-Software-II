<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Pedido Concluído</title>
        <link rel="stylesheet" href="cliente.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Almendra+SC&display=swap" rel="stylesheet">
        <link href="https://fonts.googleapis.com/css2?family=Uncial+Antiqua&display=swap" rel="stylesheet">
    </head>
    <body class="completed">
        <main class="completed-screen">
            <div class="completed-card">
                <h1>Pedido Concluído!</h1>
                <p class="completed-subtitle">Seu pedido está sendo preparado.</p>
                <div class="status-chip success">Pedido aceito com sucesso</div>
                <div class="time-preview">
                    <span>Previsão de preparo:</span>
                    <strong>25 min</strong>
                </div>
                <p class="completed-note"></p>
                <h2>Faça um novo pedido</h2>
                <a href="pedido.html" class="primary-button">Fazer novo pedido</a>
                <h2>Retorne à tela inicial</h2>
                <a href="index.html" class="primary-button">Voltar ao início</a>
            </div>
        </main>
    </body>
</html>
