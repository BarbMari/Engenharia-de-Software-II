<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Cardápio</title>
        <link rel="stylesheet" href="cliente.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Almendra+SC&display=swap" rel="stylesheet">
        <link href="https://fonts.googleapis.com/css2?family=Uncial+Antiqua&display=swap" rel="stylesheet">
        <style>
            
        </style>
    </head>
    <body>
    <nav>
        <!-- Precisa ter: menu lateral, pizzas -->
            <div class="container">
                <aside class="sidebar">
                    <ul>
                        <li><a class="almendra-sc-regular" href="index.html">Pizzas</a></li>
                        <li><a class="almendra-sc-regular" href="index.html#bebida">Bebidas</a></li>
                    </ul>
                    <ul class="botaoPagar">
                        <li class="pagamento setinha"><a href="pagamento.html">Pagar</a></li>
                    </ul>
                </aside>
            </div>
        
    </nav>

    <main class="principal">
        <SECTION class="visualizaPedido">
            <h1 class="uncial-antiqua-regular">Revisão</h1>
            <section>
                <h2>Pizza</h2>
                <ul>
                    <li><p>1x - Pizza Calabresa</p></li>
                    <li><p>1x - Pizza Margherita</p></li>
                    <li><p>1x - Pizza Pepperoni</p></li>
                    <li><p>1x - Pizza Vegetariana</p></li>
                </ul> 
            </section>
            <br>
            <section>
                <h2>Bebida</h2>
                <ul>
                    <li><p>1x - Coca Lata</p></li>
                    <li><p>1x - Suco de Laranja</p></li>
                    <li><p>1x - Água Mineral</p></li>
                    <li><p>1x - Refrigerante</p></li>
                </ul> 
            </section> 
        </SECTION>
        <br>
        <br>         
        <SECTION class="pagamentos">
            <h2>Pagamento</h2>
            <div class="payment-block">
                <div class="payment-field">
                    <label for="formaPagamento">Selecione o método de pagamento</label>
                    <select name="formaPagamento" id="formaPagamento">
                        <option value="">Selecione</option>
                        <option value="pix">PIX</option>
                        <option value="credito">Cartão de Crédito</option>
                        <option value="debito">Cartão de Débito</option>
                        <option value="aVista">Dinheiro</option>
                    </select>
                </div>
                <div class="payment-field">
                    <label for="obsBox">Observações</label>
                    <textarea name="obsBox" id="obsBox" cols="80" rows="5">-> </textarea>
                </div>
            </div>
        </SECTION>
        <br>
        <br>
        <h2>Confirmar</h2>
        <div id="confirmaPedido">
            <button class="sendButton"> FAZER PEDIDO </button>
        </div>
    </main>

    </body>
</html>
