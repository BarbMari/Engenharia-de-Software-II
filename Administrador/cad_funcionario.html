<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/styles.css" />
    <title>Cadastro dos Funcionários</title>
  </head>
  <body>
    <header>
      <picture><img /></picture>
      <h1>PizzaBot</h1>

      <div id="user"></div>
    </header>

    <div id="sidebar">
      <ul>
        <li><a href="./index.html">Início</a></li>
        <li><a href="./cad_funcionario">Cad. Funcionários</a></li>
        <li><a href="./cad_produtos">Cad. Produtos</a></li>
        <li><a href="./rel_produtos">Rel. Estoque</a></li>
        <li><a href="./rel_vendas">Rel. Vendas</a></li>
        <li><a href="./rel_pedidos">Rel. Pedidos</a></li>
        <li><a href="./rel_funcionarios">Rel. Funcionários</a></li>
      </ul>
    </div>

    <main>
      <h2>Cadastro de Funcionários</h2>

      <form id="formFuncionario">
        <input type="hidden" id="idAtual" />

        <div class="campo">
          <label>Nome Completo:</label>
          <input type="text" id="nome" required />
        </div>

        <div class="row">
          <div class="campo">
            <label>E-mail:</label>
            <input type="email" id="email" required />
          </div>
          <div class="campo">
            <label>Telefone:</label>
            <input type="tel" id="telefone" placeholder="(00) 00000-0000" />
          </div>
        </div>

        <div class="row">
          <div class="campo">
            <label>Cargo:</label>
            <input type="text" id="cargo" required />
          </div>
          <div class="campo">
            <label>CPF:</label>
            <input type="text" id="cpf" placeholder="000.000.000-00" />
          </div>
        </div>

        <button type="submit" id="btnSalvar">Finalizar Cadastro</button>
      </form>
    </main>
  </body>
</html>
