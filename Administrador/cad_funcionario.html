<!DOCTYPE html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/funcionario.css" />
    <link rel="icon" href="../Imagens/reallogofinal.png" type="image/png" />
    <title>Cadastro dos Funcionários</title>
  </head>
  <body>
    <header>
      <div class="header-left">
        <h1>NanoSabores</h1>
        <img src="../Imagens/reallogofinal.png" />
      </div>

      <div id="user">Admin</div>
    </header>

    <div id="sidebar">
      <div class="container-sidebar">
        <ul>
          <li><a href="./index.html">Início</a></li>

          <li class="categoria">Cadastros</li>
          <li>
            <a href="./cad_funcionario.html" class="active">Funcionários</a>
          </li>
          <li><a href="./cad_produto.html">Produtos</a></li>

          <li class="categoria">Relatórios</li>
          <li><a href="./rel_produto.html">Estoque</a></li>
          <li><a href="./rel_venda.html">Vendas</a></li>
          <li><a href="./rel_pedido.html">Pedidos</a></li>
          <li><a href="./rel_funcionario.html">Funcionários</a></li>
        </ul>
      </div>
    </div>

    <main>
      <div id="containerMain">
        <h2>Cadastro de Funcionários</h2>
        <p class="subtitulo">Insira os dados aqui:</p>

        <form id="formFuncionario">
          <input type="hidden" id="idAtual" />

          <div class="campo">
            <label>Nome Completo:</label>
            <input type="text" id="nome" required />
          </div>

          <div class="row">
            <div class="campo">
              <label>E-mail:</label>
              <input type="email" id="email" required />
            </div>
            <div class="campo">
              <label>Telefone:</label>
              <input type="tel" id="telefone" placeholder="(00) 00000-0000" />
            </div>
          </div>

          <div class="row">
            <div class="campo">
              <label>Cargo:</label>
              <input type="text" id="cargo" required />
            </div>
            <div class="campo">
              <label>CPF:</label>
              <input type="text" id="cpf" placeholder="000.000.000-00" />
            </div>
          </div>

          <button type="submit" id="btnSalvar">Finalizar Cadastro</button>
        </form>
      </div>
    </main>
  </body>
</html>
