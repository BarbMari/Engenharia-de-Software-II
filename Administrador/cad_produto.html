    <header>
      <div class="header-left">
        <h1>NanoSabores</h1>
        <img src="../Imagens/pizza-slice-felted-floating-cartoon-vector-icon-ilustracao-icon-objeto-alimentar-vector-plano-isolado.png" alt="Logo" />
      </div>
      <div id="user">Admin</div>
    </header>

    <div id="sidebar">
      <div class="container-sidebar">
        <ul>
          <li><a href="./index.html">Início</a></li>

          <li class="categoria">Cadastros</li>
          <li><a href="./cad_funcionario.html">Funcionários</a></li>
          <li><a href="./cad_produto.html" class="active">Produtos</a></li>

          <li class="categoria">Relatórios</li>
          <li><a href="./rel_funcionario.html">Funcionários</a></li>

          <li><a href="./rel_venda.html">Vendas</a></li>
        </ul>
      </div>

    <main>
      <div id="containerMain">
        <h2>Cadastro de Produtos</h2>
        <p class="subtitulo">Insumos da pizzaria e bebidas</p>

        <form id="formProduto" action="salvar_produto.php" method="POST">

          <div class="row">
            <div class="campo">
              <label>Nome do Produto:</label>
              <input type="text" name="nomeProduto" required />
            </div>

            <div class="campo">
              <label>Categoria:</label>
              <select name="categoria" required>
                <option value="">Escolha...</option>
                <option value="Frios">Mercearia</option>
                <option value="Massas">Frios e Laticínios</option>
                <option value="Massas">Hortifruti</option>
                <option value="Bebidas">Bebidas</option>
                <option value="Embalagens">Embalagens e Descartáveis</option>
              </select>
            </div>
          </div>

          <div class="row">
            <div class="campo">
              <label>Quantidade:</label>
              <input type="number" name="quantidade" min="0" step="1" required />
            </div>

            <div class="campo">
              <label>Unidade:</label>
              <select name="unidade" required>
                <option value="">Escolha...</option>
                <option value="KG">KG</option>
                <option value="G">G</option>
                <option value="L">L</option>
                <option value="DZ">Dúzia</option>
                <option value="UN">Unidade</option>
                <option value="CX">Caixa (24 latas)</option>
              </select>
            </div>
          </div>

          <div class="row">
            <div class="campo">
              <label>Custo Unitário R$:</label>
              <input type="number" name="custoUnitario" step="0.01" min="0" required />
            </div>

            <div class="campo">
              <label>Data de Entrada:</label>
              <input type="date" name="dataEntrada" required />
            </div>
          </div>

          <div class="row">
            <div class="campo">
              <label>Data de Validade:</label>
              <input type="date" name="dataValidade" required />
            </div>

            <div class="campo total-campo">
              <label>Custo Total (CUn × Un ) R$:</label>
              <input type="number" id="custoTotal" name="custoTotal" readonly placeholder="0.00 (auto)" />
            </div>
          </div>

          <button type="submit">Salvar Produto</button>

        </form>
      </div>
    </main>
  </body>
</html>
