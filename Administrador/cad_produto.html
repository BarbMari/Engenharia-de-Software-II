<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/styles.css" />
    <link rel="icon" href="../Imagens/reallogofinal.png" type="image/png" />
    <title>Administração</title>
  </head>
  <body>
    <header>
      <h1>NanoSabores</h1>
      <img src="../Imagens/reallogofinal.png" />

      <div id="user"></div>
    </header>

    <div id="sidebar">
        <div class="container-sidebar">
            <ul>
                <li><a href="./index.html">Início</a></li>
                <li><a href="./cad_funcionario.html">Funcionários</a></li>
                <li><a href="./cad_produto.html" class="active">Produtos</a></li>
                <li><a href="./rel_produto.html">Estoque</a></li>
                <li><a href="./rel_venda.html">Vendas</a></li>
                <li><a href="./rel_pedido.html">Pedidos</a></li>
                <li><a href="./rel_funcionario.html">Relatório</a></li>
            </ul>
        </div>
    </div>

    <!-- CONTEÚDO -->
    <main>
        <div id="containerMain">

            <div class="container">
                <div class="form-section">
                    <div class="form-row">
                        <div class="form-group">
                            <label>Produto</label>
                            <input type="text" id="produto" placeholder="Nome">
                        </div>
                        <div class="form-group">
                            <label>Quantidade</label>
                            <input type="number" id="quantidade" min="0">
                        </div>
                    <div class="form-group">
                        <label>Unidade</label>
                        <select id="unidade">
                            <option value="">Selecione</option>
                            <option value="kg">KG</option>
                            <option value="un">Unidade</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Custo Unitário</label>
                        <input type="number" id="custoUnidade" step="0.01">
                    </div>
                    <div class="form-group">
                        <label>Custo Total</label>
                        <input type="number" id="custoTotal" readonly>
                    </div>
                </div>
                <button class="btn adicionar" onclick="adicionar()">Adicionar</button>
            </div>

            <div class="table-section">
                <table>
                    <thead>
                        <tr>
                            <th>Produto</th>
                            <th>Qtd</th>
                            <th>Un</th>
                            <th>Custo Uni</th>
                            <th>Custo Tot</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="lista">
                        <tr><td colspan="6" class="empty">Sem produtos</td></tr>
                    </tbody>
                </table>
                <div class="total" id="total">Total: R$ 0,00</div>
            </div>
        </div>
    </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
