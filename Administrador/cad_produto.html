<body>
    <header>
        <h1>NanoSabores</h1>
        <img src="../Imagens/reallogofinal.jpg">

        <div id="user"></div>

    <div id="sidebar">

     <main>
      <h2>Cadastro de Produtos</h2>

      <form id="formProduto">
        <input type="hidden" id="idAtual" />

        <div class="campo">
          <label>Nome produto:</label>
          <input type="text" id="nome"  placeholder="Produto" required />
        </div>

        <div class="row">
          <div class="campo">
            <label>Validade:</label>
            <input type="date" id="validade"  required />
          </div>
          <div class="campo">
            <label>Compra:</label>
            <input type="date" id="origem" required />
          </div>
        </div>

         <div class="row">
          <div class="campo">
            <label>Quantidade:</label>
            <input type="number" id="validade"  placeholder="Nº Unidades" required />
          </div>
          <div class="campo">
            <label>Lote:</label>
            <input type="number" id="origem" placeholder="00000000" />
          </div>
        </div>

        <button type="submit" id="btnSalvar">Finalizar Cadastro</button>
      </form>
    </main>
    
</body>
