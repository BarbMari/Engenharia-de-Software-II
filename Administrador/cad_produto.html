<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/produto.css" />
    <link
      rel="icon"
      href="../assets/LogoNanoSaboresCortada.png"
      type="image/png"
    />
    <title>Cadastro do Estoque</title>
  </head>

  <body>
    <header>
      <div class="header-left">
        <h1>NanoSabores</h1>
        <img src="../assets/icon.png" alt="Logo do NanoSabores" />
      </div>

      <a id="user" href="./login.html">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          fill="currentColor"
          color="#2c5530"
        >
          <path
            d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"
          />
        </svg>
      </a>
    </header>

    <div id="sidebar">
      <div class="container-sidebar">
        <ul>
          <li class="categoria">Home</li>
          <li><a href="./index.html">Início</a></li>

          <li class="categoria">Cadastros</li>
          <li><a href="./cad_funcionario.html">Funcionários</a></li>
          <li><a href="./cad_produto.html" class="active">Produtos</a></li>
          <li><a href="./cad_sabores.html">Sabores de Pizza</a></li>

          <li class="categoria">Relatórios</li>
          <li><a href="./rel_funcionario.html">Funcionários</a></li>
          <li><a href="./rel_produto.html">Estoque</a></li>
          <li><a href="./rel_pedido.html">Pedidos</a></li>
          <li><a href="./rel_venda.html">Vendas</a></li>
          <li><a href="./rel_sabores.html">Sabores Cadastrados</a></li>
        </ul>
      </div>
    </div>

    <main>
      <div id="containerMain">
        <h2>Cadastro de Produtos</h2>
        <p class="subtitulo">Insumos da pizzaria e bebidas</p>

        <form id="formProduto">
          <div class="row">
            <div class="campo">
              <label>Nome do Produto:</label>
              <input type="text" name="nomeProduto" required />
            </div>

            <div class="campo">
              <label>Categoria:</label>
              <select name="categoria" required>
                <option value="">Escolha...</option>
                <option value="Mercearia">Mercearia</option>
                <option value="Frios e Laticínios">Frios e Laticínios</option>
                <option value="Hortifruti">Hortifruti</option>
                <option value="Bebidas">Bebidas</option>
                <option value="Embalagens e Descartáveis">Embalagens e Descartáveis</option>
              </select>
            </div>
          </div>

          <div class="row">
            <div class="campo">
              <label>Quantidade:</label>
              <input
                type="number"
                name="quantidade"
                min="0"
                step="1"
                required
              />
            </div>

            <div class="campo">
              <label>Unidade:</label>
              <select name="unidade" required>
                <option value="">Escolha...</option>
                <option value="KG">KG</option>
                <option value="G">G</option>
                <option value="L">L</option>
                <option value="DZ">Dúzia</option>
                <option value="UN">Unidade</option>
                <option value="CX">Caixa (24 latas)</option>
              </select>
            </div>
          </div>

          <div class="row">
            <div class="campo">
              <label>Custo Unitário R$:</label>
              <input
                type="number"
                name="custoUnitario"
                step="0.01"
                min="0"
                required
              />
            </div>

            <div class="campo">
              <label>Data de Entrada:</label>
              <input type="date" name="dataEntrada" required />
            </div>
          </div>

          <div class="row">
            <div class="campo">
              <label>Data de Validade:</label>
              <input type="date" name="dataValidade" required />
            </div>

            <div class="campo total-campo">
              <label>Custo Total (CUn × Un ) R$:</label>
              <input
                type="number"
                id="custoTotal"
                name="custoTotal"
                readonly
                placeholder="0.00 (auto)"
              />
            </div>
          </div>

          <button type="submit">Salvar Produto</button>
        </form>
      </div>
    </main>
    <script src="./Js/cad_produto.js"></script>
  </body>
</html>
