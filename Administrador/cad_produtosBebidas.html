<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/cadProdutosBebidas.css" />
    <link rel="icon" href="../assets/reallogofinal.png" type="image/png" />
    <title>Cadastro de Vendas</title>
  </head>
  <body>
    <header>
      <div class="header-left">
        <h1>NanoSabores</h1>
        <img src="../assets/icon.png" alt="Logo" />
      </div>
      <div id="user">Admin</div>
    </header>

    <div id="sidebar">
      <div class="container-sidebar">
        <ul>
          <li class="categoria">Home</li>
          <li><a href="./index.html">Início</a></li>

          <li class="categoria">Cadastros</li>
          <li><a href="./cad_funcionario.html">Funcionários</a></li>
          <li><a href="./cad_produto.html">Produtos</a></li>
          <li><a href="./cad_produtosBebidas.html" class="active">Venda de Pizzas e Bebibas</a></li>

          <li class="categoria">Relatórios</li>
          <li><a href="./rel_funcionario.html">Funcionários</a></li>
          <li><a href="./rel_produto.html">Estoque</a></li> 
          <li><a href="./rel_pedido.html">Pedidos</a></li>
          <li><a href="./rel_venda.html">Vendas</a></li>
        </ul>
      </div>
    </div>

    <main>
      <div id="containerMain">
        <h2>Nova Pizza</h2>
        <p class="subtitulo">Crie uma novo sabor!</p>
    
      <div id="formVenda">
          <div class="row">
            <div class="campo full">
              <label>Pizza</label>
              <select id="pizza">
                <option value="">Selecione o tipo</option>
                <option value="Salgada">
                  Salgada
                </option>
                <option value="Vegetariana">
                  Vegetariana
                </option>
                <option value="Doce">
                  Doce
                </option>
              </select>
            </div>
          </div>

          <div class="row">
            <div class="campo">
              <label>Borda</label>
               <select id="pizza">
                <option value="">Nenhuma</option>
                <option value="Sim">Sim</option>
                <option value="Não">Não</option>
              </select>
            </div>
            
            <div class="campo">
              <label>Tipo da borda</label>
              <select id="pizza">
                <option value="">Nenhuma</option>
                <option value="Chocolate Preto">Chocolate Preto</option>
                <option value="Chocolate Branco">Chocolate Branco</option>
                <option value="Catupiry">Catupiry</option>
                <option value="Cheddar">Cheddar</option>
              </select>
            </div>

            <div class="campo">
              <label>Tipo de molho</label>
              <select id="pizza">
                <option value="">Nenhum</option>
                <option value="Tomate">Tomate</option>
                <option value="Pesto">Pesto</option>
              </select>
            </div>
          

            <div class="campo">
              <label>Tipo de queijo</label>
              <select id="pizza">
                <option value="">Nenhum</option>
                <option value="Mussarela">Mussarela</option>
                <option value="Cheddar">Cheddar</option>
                <option value="Parmesão">Parmesão</option>
                <option value="Provolone">Provolone</option>
                <option value="Gouda">Gouda</option>
                <option value="5 Queijos">5 Queijos</option>
              </select>
          </div>
        </div>
        
          <div class="row">
            <div class="campo">
              <label>Ingredientes:</label>
              <input type="text" name="ingredientes" required />
            </div>
          </div>

          <div class="row">
            <div class="campo full">
              <label>Definir Preço</label>
              <input
                type="number"
                id="valorTotal"
                step="0.5"
                placeholder="R$ 45.00"
              />
            </div>
          </div>

          <button onclick="salvarVenda()" class="btn-salvar">
            Salvar Venda
          </button>
        </div>

        <div class="lista-vendas">
          <div class="btn-salvar">
            <a  href="./rel_venda.html"><p>Visualizar Vendas</p></a>
          </div>
        </div>
      </div>

    </main>
  </body>
</html>
