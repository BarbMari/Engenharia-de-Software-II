<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/login.css" />
    <link rel="icon" href="../assets/reallogofinal.png" type="image/png" />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <title>Login — NanoSabores</title>
  </head>

  <body>
    <main class="login-page">
      <section class="login-card">
        <div class="login-brand">
          <img src="../assets/icon.png" alt="Logo NanoSabores" />
          <span>NanoSabores</span>
        </div>

        <h1>Bem-vindo de volta</h1>
        <p class="login-sub">Acesse o painel da pizzaria</p>

        <form action="">
          <div class="campo">
            <label for="user">Usuário</label>
            <input
              type="text"
              id="user"
              name="user"
              placeholder="Digite seu usuário"
              autocomplete="username"
            />
          </div>

          <div class="campo">
            <label for="pwd">Senha</label>
            <input
              type="password"
              id="pwd"
              name="password"
              placeholder="••••••••"
              autocomplete="current-password"
            />
          </div>

          <!-- usar <button type="submit"> quando implementar o backend -->
          <a class="btn-login" href="./index.html">Entrar</a>
        </form>
      </section>
    </main>
  </body>
</html>
